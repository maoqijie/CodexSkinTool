name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-15
            bundles: app,dmg
            artifact: CodexSkinTool-macOS
            paths: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - name: Windows
            os: windows-2025
            bundles: nsis,msi
            artifact: CodexSkinTool-Windows
            paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Check Rust targets
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Lint Rust
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Test Rust
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Run legacy Swift regression baseline
        if: runner.os == 'macOS'
        run: ./scripts/test.sh

      - name: Build macOS application
        if: runner.os == 'macOS'
        run: npm run tauri -- build --bundles app

      - name: Verify macOS application bundle
        if: runner.os == 'macOS'
        run: |
          codesign --force --deep --sign - src-tauri/target/release/bundle/macos/CodexSkinTool.app
          codesign --verify --deep --strict --verbose=2 src-tauri/target/release/bundle/macos/CodexSkinTool.app

      - name: Build macOS disk image
        if: runner.os == 'macOS'
        run: npm run tauri -- build --bundles dmg

      - name: Build Windows installers
        if: runner.os == 'Windows'
        run: npm run tauri -- build --bundles "${{ matrix.bundles }}"

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error
